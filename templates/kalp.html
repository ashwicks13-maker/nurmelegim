<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤍</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    height:100vh;
    font-family:Arial,sans-serif;
}

canvas{
    position:fixed;
    inset:0;
}

.topText{
    position:fixed;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:28px;
    z-index:5;
    text-shadow:
    0 0 10px red,
    0 0 25px red;
    letter-spacing:3px;
}

.bottomText{
    position:fixed;
    bottom:25px;
    width:100%;
    text-align:center;
    color:#ff2a55;
    font-size:18px;
    z-index:5;
    letter-spacing:4px;
    text-shadow:
    0 0 10px red,
    0 0 25px red;
}



.floatLove{
    position:fixed;
    color:white;
    font-size:18px;
    pointer-events:none;
    opacity:0;
    animation: floatUp 4s linear forwards;
    text-shadow:
    0 0 10px red,
    0 0 20px red;
    z-index:6;
}

@keyframes floatUp{

    0%{
        transform:translateY(0px) scale(.7);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120px) scale(1.2);
        opacity:0;
    }

}

</style>
</head>

<body>

<div class="topText">🤍 SENİ SEVİYORUM KARIMMMMMMMMMMN🤍</div>

<canvas id="canvas"></canvas>

<div class="bottomText">✨ sonsuza kadar seninleyim ✨</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){

    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;

}

resize();
window.addEventListener("resize",resize);



function heart(t){

    return {

        x:16*Math.pow(Math.sin(t),3),

        y:13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t)

    };

}


// OPTİMİZE PARTİCLE
class Particle{

    constructor(x,y){

        this.baseX = x;
        this.baseY = y;

        this.reset();

    }

    reset(){

        this.x = this.baseX;
        this.y = this.baseY;

        this.vx = (Math.random()-0.5)*2.5;
        this.vy = (Math.random()-0.5)*2.5;

        this.size = Math.random()*1.8 + 0.5;

        this.life = 80;

    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        // GERİ ÇEKİLME
        this.x += (this.baseX - this.x)*0.02;
        this.y += (this.baseY - this.y)*0.02;

        this.life--;

        if(this.life <= 0){
            this.reset();
        }

    }

    draw(){

        ctx.beginPath();

        ctx.fillStyle = "rgba(255,20,60,.9)";

        ctx.shadowBlur = 10;
        ctx.shadowColor = "red";

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

        ctx.fill();

    }

}

let particles = [];

function createHeart(){

    particles = [];

    const scale = Math.min(w,h)/42;

    for(let t=0;t<Math.PI*2;t+=0.03){

        const pos = heart(t);

        const x = w/2 + pos.x*scale;
        const y = h/2 - pos.y*scale;

        // AZ AMA AKICI
        for(let i=0;i<3;i++){

            particles.push(

                new Particle(

                    x + (Math.random()-0.5)*18,

                    y + (Math.random()-0.5)*18

                )

            );

        }

    }

}

createHeart();

let beat = 0;

function animate(){

    requestAnimationFrame(animate);

    ctx.fillStyle = "rgba(0,0,0,.15)";
    ctx.fillRect(0,0,w,h);

    beat += 0.04;

    let pulse = 1 + Math.sin(beat)*0.03;

    ctx.save();

    ctx.translate(w/2,h/2);

    ctx.scale(pulse,pulse);

    ctx.translate(-w/2,-h/2);

    for(let p of particles){

        p.update();
        p.draw();

    }

    ctx.restore();

}

animate();


const words = [

"❤️",
"💋",
"😍",
"Aşkım",
"Karıcım",
"Ömrüm",
"Sevdam",
"💖",
"✨",
"Seni Seviyorum"

];

function spawnLove(){

    const div = document.createElement("div");

    div.className = "floatLove";

    div.innerText = words[Math.floor(Math.random()*words.length)];

    div.style.left = Math.random()*90 + "%";

    div.style.top = Math.random()*80 + "%";

    div.style.fontSize = (16 + Math.random()*18) + "px";

    document.body.appendChild(div);

    setTimeout(()=>{

        div.remove();

    },4000);

}

setInterval(spawnLove,700);



canvas.addEventListener("click",(e)=>{

    for(let i=0;i<25;i++){

        particles.push(

            new Particle(

                e.clientX + (Math.random()-0.5)*40,

                e.clientY + (Math.random()-0.5)*40

            )

        );

    }

});

</script>

</body>
</html>
